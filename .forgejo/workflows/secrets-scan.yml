name: secrets-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: docker
    container:
      image: node:20-bookworm
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4

      - name: Install and scan
        run: |
          curl -sL https://github.com/betterleaks/betterleaks/releases/download/v1.1.2/betterleaks_1.1.2_linux_x64.tar.gz | tar xz -C /usr/local/bin
          betterleaks dir . --exit-code 1 --redact
